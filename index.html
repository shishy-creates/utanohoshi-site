<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>うたのほし | Discography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="discography-home">
<header class="site-header orbit-site-header">
  <div class="header-flex">
    <div class="site-title-block">
      <h1>うたのほし</h1>
      <p>UTANOHOSHI DISCOGRAPHY</p>
    </div>
    <nav class="home-nav" aria-label="メインナビゲーション">
      <a href="#discography-orbit">作品</a>
      <a href="#today-song">おみくじ</a>
      <a href="constellations.html">星座マップ</a>
      <a href="profile.html">プロフィール</a>
    </nav>
  </div>
</header>

<main>
  <section id="discography-orbit" class="orbit-discography-section" aria-labelledby="orbit-heading">
    <div class="orbit-section-head">
      <div>
        <h2 id="orbit-heading">唄と愛をこの星に。あなたのもとに。</h2>
      </div>
      <button id="album-view-toggle" class="album-view-toggle" type="button" aria-expanded="false" aria-controls="album-list-wrap">
        全作品を見る
      </button>
    </div>

    <div id="album-orbit" class="album-orbit" aria-live="polite">
      <div class="orbit-ring orbit-ring-outer" aria-hidden="true"></div>
      <div class="orbit-ring orbit-ring-inner" aria-hidden="true"></div>
      <div id="orbit-album-layer" class="orbit-album-layer"></div>

      <div class="orbit-focus-copy">
        <p id="orbit-album-meta" class="orbit-album-meta"></p>
        <h3 id="orbit-album-title" class="orbit-album-title"></h3>
        <p id="orbit-album-title-en" class="orbit-album-title-en"></p>
        <p id="orbit-album-description" class="orbit-album-description"></p>
        <a id="orbit-album-link" class="orbit-album-link" href="#">アルバムをひらく</a>
      </div>

      <button id="orbit-prev" class="orbit-arrow orbit-arrow-prev" type="button" aria-label="前の作品群">←</button>
      <button id="orbit-next" class="orbit-arrow orbit-arrow-next" type="button" aria-label="次の作品群">→</button>
      <div id="orbit-position" class="orbit-position"></div>
    </div>
  </section>

  <section id="today-song" class="omikuji-section">
    <div class="omikuji-card">
      <div class="omikuji-head">
        <div>
          <p class="omikuji-label">今日の一曲おみくじ</p>
          <h2 class="omikuji-title">何が出るかな？</h2>
          <p class="omikuji-note">ボタンを押すとランダムで1曲を紹介します。</p>
        </div>
        <button id="omikuji-button" class="omikuji-button" type="button">ひいてみる</button>
      </div>
      <div id="omikuji-result" class="omikuji-result">
        <p class="omikuji-placeholder">まだおみくじは引かれていません。</p>
      </div>
    </div>
  </section>

  <section id="album-list-wrap" class="album-index-section album-index-section--orbit" hidden>
    <div class="album-list-heading">
      <p class="orbit-kicker">ALL ALBUMS</p>
      <h2>すべての作品</h2>
    </div>
    <div id="album-list" class="album-index-grid">
      <!-- app.js でアルバムカードが生成されます -->
    </div>
  </section>
</main>

<footer class="site-footer">
  © うたのほし / UTANOHOSHI
</footer>

<script src="app.js?v=20260712-orbit-5"></script>
</body>
</html>
